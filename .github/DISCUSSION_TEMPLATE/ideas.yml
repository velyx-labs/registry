title: "Idea"
labels:
  - idea
body:
  - type: markdown
    attributes:
      value: |
        Use this discussion for early proposals around the registry, previews, metadata contracts, or contributor workflows.
  - type: textarea
    id: idea
    attributes:
      label: Idea
      description: Describe the idea directly.
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem it solves
      description: Explain the limitation or maintenance problem.
  - type: textarea
    id: tradeoffs
    attributes:
      label: Tradeoffs
      description: Note API, metadata, preview, or migration concerns.
